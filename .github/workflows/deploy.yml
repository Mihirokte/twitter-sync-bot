# Matches GitHub's recommended Pages workflow structure
# https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || '' }}
          VITE_DEFAULT_SPREADSHEET_ID: ${{ secrets.VITE_DEFAULT_SPREADSHEET_ID || '' }}
          VITE_GITHUB_REPO: ${{ secrets.VITE_GITHUB_REPO || '' }}
        run: |
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Verify artifact
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "Missing dist/index.html" && exit 1)
          grep -q "/twitter-sync-bot/assets/" dist/index.html || (echo "Built index must reference /twitter-sync-bot/assets/ - got wrong index?" && cat dist/index.html && exit 1)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
